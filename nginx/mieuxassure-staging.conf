# =============================================================================
# Mieux Assure - Nginx Configuration Snippet (Staging)
# =============================================================================
#
# This snippet goes in a SEPARATE server block for staging.
# Staging uses port-based isolation: the Docker container maps to port 3001
# on the host (see docker-compose.staging.yml).
#
# Option A: Separate subdomain (e.g., staging.mieuxassure.messagingme.app)
# Option B: Same server, different internal routing
#
# For simplicity, this mirrors the production config but targets port 3001.
#
# Prerequisites:
#   1. Create htpasswd file (can reuse production or create separate):
#      sudo htpasswd -c /etc/nginx/.htpasswd-mieuxassure admin
#   2. Ensure the staging Docker container is running on port 3001
#   3. Reload Nginx after adding this snippet:
#      sudo nginx -t && sudo systemctl reload nginx
#
# =============================================================================

# Webhook ingest endpoint -- bypass basic auth
location = /analyze/api/ingest {
    auth_basic off;

    proxy_pass http://127.0.0.1:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Cron analysis endpoint -- bypass basic auth
location = /analyze/api/cron/analyze {
    auth_basic off;

    proxy_pass http://127.0.0.1:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Main application -- protected by basic auth
location /analyze {
    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd-mieuxassure;

    proxy_pass http://127.0.0.1:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Disable buffering for streaming responses
    proxy_buffering off;
    add_header X-Accel-Buffering no;
}
