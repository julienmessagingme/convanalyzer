# =============================================================================
# Mieux Assure - Nginx Configuration Snippet (Production)
# =============================================================================
#
# This is a SNIPPET to paste inside the existing server { } block for
# mieuxassure.messagingme.app (or whichever domain serves the app).
#
# Prerequisites:
#   1. Create htpasswd file:
#      sudo htpasswd -c /etc/nginx/.htpasswd-mieuxassure admin
#   2. Ensure the Docker container is running on port 3000
#   3. Reload Nginx after adding this snippet:
#      sudo nginx -t && sudo systemctl reload nginx
#
# =============================================================================

# Webhook ingest endpoint -- bypass basic auth
# External services (UChat) POST here; they cannot provide credentials.
location = /analyze/api/ingest {
    auth_basic off;

    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Cron analysis endpoint -- bypass basic auth
# Called by the system crontab with a Bearer token for authentication.
location = /analyze/api/cron/analyze {
    auth_basic off;

    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Main application -- protected by basic auth
# All dashboard routes under /analyze require login.
location /analyze {
    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd-mieuxassure;

    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support (Next.js HMR in dev, potential future use)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Disable buffering for streaming responses
    proxy_buffering off;
    add_header X-Accel-Buffering no;
}
