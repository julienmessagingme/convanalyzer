version: "3.8"
services:
  mieuxassure:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3001:3000"
    env_file:
      - .env.staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/analyze/api/workspaces"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
